<!DOCTYPE html>
<html>
<head>
    <title>E-Izin Pesantren</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah scroll double */
        }
        
        /* Container untuk membungkus iframe */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            /* Trik: Buat tinggi sedikit lebih besar (misal 105%) 
               untuk mendorong tulisan 'dibuat oleh Google' ke luar area pandang */
            height: calc(100% + 50px); 
            border: none;
            margin-top: -1px; /* Menghilangkan celah atas */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbxvwJNyjM5e1XsDay1kd_cR8AdK8F7K6CUm-zq8_eGUpJvCr3RGeRuGtOBLtSp-SQlT/exec"></iframe>
    </div>
</body>
</html>
